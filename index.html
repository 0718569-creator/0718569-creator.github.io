    <dialog>
        <h2>Change Background</h2>
        <input type="file" name="upload" id="fileupload" accept="image/*">

        <button onclick="this.closest('dialog').close()" class="btn-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x-icon lucide-x"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
    </dialog>

    <script>
        if (localStorage.getItem('backgroundImage')) {
            document.body.style.backgroundImage = `url(${localStorage.getItem('backgroundImage')})`;
            document.body.style.backgroundSize = 'cover';
            document.body.style.backgroundRepeat = 'no-repeat';
        }

        function changeBackground() {
            const dialog = document.querySelector('dialog')
            dialog.showModal();

            const fileInput = document.getElementById('fileupload');
            fileInput.addEventListener('change', function () {
                const file = fileInput.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function (e) {
                        document.body.style.backgroundImage = `url(${e.target.result})`;
                        localStorage.setItem('backgroundImage', e.target.result);
                        document.body.style.backgroundSize = 'cover';
                        document.body.style.backgroundPosition = 'center';
                    };
                    reader.readAsDataURL(file);
                }
            });
        }
    </script>
